[global/wm]
override-redirect = true
wm-restack = bspwm

[colors]
background = #0d1117
foreground = #e6edf3
dim        = #21262d
dimtext    = #484f58
green      = #3fb950

; ── Single Pill Bar ───────────────────────────────────────────────────────────

[bar/main]
monitor    = HDMI-A-0
enable-ipc = true
height     = 36
width      = 92%
offset-x   = 4%
offset-y   = 1.5%
background = ${colors.background}
foreground = ${colors.foreground}
radius     = 18

modules-left   = terminal xworkspaces
modules-center = xwindow
modules-right  = spotify network pulseaudio date powermenu

font-0 = JetBrainsMonoNL Nerd Font:style=Bold:pixelsize=9;3
font-1 = JetBrainsMonoNL Nerd Font:size=14;4
font-2 = Material Design Icons:style=Bold:size=10;3
font-3 = unifont:fontformat=truetype:size=8:antialias=false;0

padding-left  = 1
padding-right = 2
cursor-click  = pointer

; ── Modules ───────────────────────────────────────────────────────────────────

[module/terminal]
type              = custom/text
format            = "  >_  "
format-foreground = ${colors.foreground}
click-left        = alacritty --working-directory ~ &

[module/xworkspaces]
type           = internal/xworkspaces
pin-workspaces = true
enable-click   = true
enable-scroll  = true
format         = <label-state>

label-active            = %index%
label-active-foreground = #0d1117
label-active-background = ${colors.green}
label-active-padding    = 2

label-occupied            = %index%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding    = 2

label-urgent            = %index%
label-urgent-foreground = #ff7b72
label-urgent-padding    = 2

label-empty            = %index%
label-empty-foreground = ${colors.dimtext}
label-empty-padding    = 2

[module/spotify]
type             = custom/script
exec             = ~/.config/polybar/scripts/spotify.sh
interval         = 2
format           = %{F#3fb950}󰓇%{F-}  <label>
format-padding   = 2
click-left       = playerctl --player=spotify play-pause
click-right      = playerctl --player=spotify next

[module/xwindow]
type  = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.foreground}
format = %{F#3fb950} %{F-} <label>

[module/network]
type              = internal/network
interface         = enp6s0
interval          = 2.0
format-connected         = <label-connected>
format-connected-underline = ${colors.green}
format-connected-padding   = 2
label-connected   = "%{F#3fb950}󰁆%{F-} %downspeed%  %{F#3fb950}󰕒%{F-} %upspeed%"
format-disconnected = ""

[module/cpu]
type     = internal/cpu
interval = 1.0
format           = <label>
format-underline = ${colors.green}
format-padding   = 2
label            = "%{F#3fb950}CPU%{F-} %percentage%%"

[module/memory]
type     = internal/memory
interval = 2.0
format           = <label>
format-underline = ${colors.green}
format-padding   = 2
label            = "%{F#3fb950}RAM%{F-} %gb_used%G"

[module/pulseaudio]
type       = internal/pulseaudio
use-ui-max = false
interval   = 5

format-volume         = <label-volume>
format-volume-underline = ${colors.green}
format-volume-padding   = 2
label-volume            = "%{F#3fb950}󰕾%{F-} %percentage%%"

format-muted         = <label-muted>
format-muted-padding = 2
label-muted          = "%{F#484f58}󰝟%{F-}"

[module/powermenu]
type             = custom/text
format           = "  󰐥  "
format-foreground = #ff7b72
click-left       = ~/.config/polybar/scripts/powermenu.sh &

[module/date]
type     = internal/date
interval = 1.0
date     = "%a %d %b"
time     = "%H:%M"
format         = <label>
format-padding = 2
label          = "%date%  %time%"
